name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------
      # Step 1: Checkout repository
      # -----------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------
      # Step 2: Set up Node.js
      # -----------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # -----------------------------------------------
      # Step 3: Install dependencies
      # -----------------------------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------
      # Step 4: Run linter
      # -----------------------------------------------
      - name: Run linter
        run: npm run lint

      # -----------------------------------------------
      # Step 5: Build project
      # -----------------------------------------------
      - name: Build project
        run: npm run build
